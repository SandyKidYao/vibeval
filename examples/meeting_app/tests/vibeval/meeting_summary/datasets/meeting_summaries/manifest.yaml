name: meeting_summaries
description: "Synthetic meeting transcripts for testing the summarization pipeline"
version: "1"
tags:
  - meeting
  - summarization

judge_specs:
  - method: rule
    rule: contains_all
    args:
      field: "outputs.summary"
      values_from: "expected_times"
    weight: gate

  - method: rule
    rule: length_between
    args:
      field: "outputs.action_items"
      min: 10
      max: 5000

  - method: rule
    rule: max_steps
    args:
      max: 20

  - method: rule
    rule: max_turns
    args:
      max: 1
